name: Build sqlite

on:
  push:
    branches: [main]
    tags: ['[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  docker_cli_image: "sqlite3-cli"
  docker_library_image: "sqlite3-library"
  docker_library_plex_image: "sqlite3-library-plex"

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            march: x86-64-v2
            arch_suffix: linux-x86_64-v2
          - runner: ubuntu-24.04
            march: x86-64-v3
            arch_suffix: linux-x86_64-v3
          - runner: ubuntu-24.04-arm
            march: armv8-a
            arch_suffix: linux-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Load version pins
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' pins/versions.env >> "$GITHUB_ENV"
      - name: Load library artifact stems
        id: library_artifact_stems
        run: |
          set -euo pipefail
          compat_group_field_for_group() {
            local compat_group="$1" field="$2"
            awk -F '\t' -v want_group="$compat_group" -v want_field="$field" '
              NR == 1 {
                for (i = 1; i <= NF; i++) {
                  if ($i == want_field) {
                    field_index = i
                  }
                }
                if (field_index == 0) {
                  printf "FATAL: missing library compatibility field: %s\n", want_field > "/dev/stderr"
                  exit 2
                }
                next
              }
              $0 ~ /^[[:space:]]*($|#)/ { next }
              $1 == want_group {
                if (value != "") {
                  printf "FATAL: duplicate library compatibility row for compat_group: %s\n", want_group > "/dev/stderr"
                  exit 2
                }
                value = $field_index
              }
              END {
                if (value == "") {
                  printf "FATAL: missing library compatibility row for compat_group: %s\n", want_group > "/dev/stderr"
                  exit 1
                }
                print value
              }
            ' pins/library-compat-groups.tsv
          }
          first_compat_group_for_mod() {
            local mod="$1"
            awk -F '\t' -v want_mod="$mod" '
              $0 ~ /^[[:space:]]*($|#)/ { next }
              $1 == "compat_group" { next }
              $2 == want_mod {
                print $1
                found = 1
                exit
              }
              END {
                if (!found) {
                  printf "FATAL: missing library compatibility row for mod: %s\n", want_mod > "/dev/stderr"
                  exit 1
                }
              }
            ' pins/library-compat-groups.tsv
          }
          plex_compat_group="$(first_compat_group_for_mod plex)"
          emby_compat_group="$(first_compat_group_for_mod emby)"
          plex_stem="$(compat_group_field_for_group "$plex_compat_group" artifact_stem)"
          emby_stem="$(compat_group_field_for_group "$emby_compat_group" artifact_stem)"
          plex_icu_source_version="$(compat_group_field_for_group "$plex_compat_group" icu_source_version)"
          plex_icu_source_sha512="$(compat_group_field_for_group "$plex_compat_group" icu_source_sha512)"
          emby_icu_source_version="$(compat_group_field_for_group "$emby_compat_group" icu_source_version)"
          emby_icu_source_sha512="$(compat_group_field_for_group "$emby_compat_group" icu_source_sha512)"
          if [ "$plex_icu_source_version" = "-" ] || [ "$plex_icu_source_sha512" = "-" ]; then
            echo "FATAL: Plex compatibility group is missing ICU source fields" >&2
            exit 1
          fi
          if [ "$emby_icu_source_version" != "-" ] || [ "$emby_icu_source_sha512" != "-" ]; then
            echo "FATAL: Emby compatibility group must not carry ICU source fields" >&2
            exit 1
          fi
          {
            printf 'plex=%s\n' "$plex_stem"
            printf 'emby=%s\n' "$emby_stem"
            printf 'plex_icu_source_version=%s\n' "$plex_icu_source_version"
            printf 'plex_icu_source_sha512=%s\n' "$plex_icu_source_sha512"
          } >> "$GITHUB_OUTPUT"
      - name: Pin alignment check
        run: |
          set -euo pipefail
          bash tests/check_pin_alignment.sh
          bash tests/check_multi_version_pin_alignment.sh
      - name: Build.sh precheck paths
        run: bash tests/check_build_sh_prechecks.sh
      - name: Build sqlite CLI
        run: sudo docker build --rm -t "${docker_cli_image}" -f docker-cli/Dockerfile . --build-arg SQLITE_AMALG_URL="${SQLITE_AMALG_URL}" --build-arg COMPRESS_SQLITE3="upx" --build-arg MARCH="${{ matrix.march }}" --build-arg SQLITE_AMALG_SHA3_256="${SQLITE_AMALG_SHA3_256}"
      - name: Extract binary from docker image
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        id: extract_cli
        with:
          image: ${{env.docker_cli_image}}
          path: /app/sqlite-amalgamation-${{env.SQLITE_VERSION}}/dist/.
          destination: cli
      - name: Upload sqlite CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.extract_cli.outputs.destination }}
          name: sqlite-${{env.SQLITE_VERSION}}-cli-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Build sqlite library
        run: sudo docker build --rm -t "${docker_library_image}" -f docker-library/Dockerfile . --build-arg SQLITE_AMALG_URL="${SQLITE_AMALG_URL}" --build-arg MARCH="${{ matrix.march }}" --build-arg SQLITE_AMALG_SHA3_256="${SQLITE_AMALG_SHA3_256}" --build-arg MIMALLOC_VERSION="${MIMALLOC_VERSION}" --build-arg MIMALLOC_URL="${MIMALLOC_URL}" --build-arg MIMALLOC_SHA512="${MIMALLOC_SHA512}" --build-arg CMAKE_VERSION="${CMAKE_VERSION}" --build-arg CMAKE_SHA256_X86_64="${CMAKE_SHA256_X86_64}" --build-arg CMAKE_SHA256_AARCH64="${CMAKE_SHA256_AARCH64}"
      - name: Extract binary from docker image
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        id: extract_library
        with:
          image: ${{env.docker_library_image}}
          path: /app/sqlite-amalgamation-${{env.SQLITE_VERSION}}/dist/.
          destination: library-${{ steps.library_artifact_stems.outputs.emby }}
      - name: Upload sqlite library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.extract_library.outputs.destination }}
          name: sqlite-${{env.SQLITE_VERSION}}-library-${{ steps.library_artifact_stems.outputs.emby }}-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Build sqlite Plex library
        run: sudo docker build --rm -t "${docker_library_plex_image}" -f docker-library/Dockerfile . --build-arg SQLITE_AMALG_URL="${SQLITE_AMALG_URL}" --build-arg MARCH="${{ matrix.march }}" --build-arg SQLITE_AMALG_SHA3_256="${SQLITE_AMALG_SHA3_256}" --build-arg SQLITE_SRC_URL="${SQLITE_SRC_URL}" --build-arg SQLITE_SRC_SHA3_256="${SQLITE_SRC_SHA3_256}" --build-arg LIBRARY_VARIANT=plex --build-arg MIMALLOC_VERSION="${MIMALLOC_VERSION}" --build-arg MIMALLOC_URL="${MIMALLOC_URL}" --build-arg MIMALLOC_SHA512="${MIMALLOC_SHA512}" --build-arg ICU_SOURCE_VERSION="${{ steps.library_artifact_stems.outputs.plex_icu_source_version }}" --build-arg ICU_SOURCE_SHA512="${{ steps.library_artifact_stems.outputs.plex_icu_source_sha512 }}"
      - name: Extract Plex library from docker image
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        id: extract_library_plex
        with:
          image: ${{env.docker_library_plex_image}}
          path: /app/sqlite-amalgamation-${{env.SQLITE_VERSION}}/dist/.
          destination: library-${{ steps.library_artifact_stems.outputs.plex }}
      - name: Upload sqlite Plex library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.extract_library_plex.outputs.destination }}
          name: sqlite-${{env.SQLITE_VERSION}}-library-${{ steps.library_artifact_stems.outputs.plex }}-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Plex support-window smokes
        run: |
          set -euo pipefail
          compat_group_field_for_group() {
            local compat_group="$1" field="$2"
            awk -F '\t' -v want_group="$compat_group" -v want_field="$field" '
              NR == 1 {
                for (i = 1; i <= NF; i++) {
                  if ($i == want_field) field_index = i
                }
                if (field_index == 0) {
                  printf "FATAL: missing library compatibility field: %s\n", want_field > "/dev/stderr"
                  exit 2
                }
                next
              }
              $0 ~ /^[[:space:]]*($|#)/ { next }
              $1 == want_group {
                value = $field_index
              }
              END {
                if (value == "") {
                  printf "FATAL: missing library compatibility row for compat_group: %s\n", want_group > "/dev/stderr"
                  exit 1
                }
                print value
              }
            ' pins/library-compat-groups.tsv
          }
          awk -F '\t' '
            $0 ~ /^[[:space:]]*($|#)/ { next }
            $1 == "mod" { next }
            $1 == "plex" && $5 == "supported" { print $2 "\t" $3 "\t" $4 }
          ' pins/runtime-support.tsv |
          while IFS=$'\t' read -r server_id image_ref compat_group; do
            [ -n "$server_id" ] || continue
            artifact_stem="$(compat_group_field_for_group "$compat_group" artifact_stem)"
            icu_source_version="$(compat_group_field_for_group "$compat_group" icu_source_version)"
            library_dir="library-${artifact_stem}"
            [ -d "$library_dir" ] || { echo "FATAL: missing library artifact dir for compat_group=$compat_group: $library_dir" >&2; exit 1; }
            docker pull "$image_ref"
            bash tools/ci/plex-icu-smoke.sh "$image_ref" "${{ matrix.arch_suffix }}" "$icu_source_version" "$library_dir"
            bash tools/ci/plex-pms-first-init-smoke.sh "$image_ref" "${{ matrix.arch_suffix }}" "${{ github.run_id }}-${server_id}" "$library_dir" "$icu_source_version"
            bash tools/ci/plex-pms-killswitch-smoke.sh "$image_ref" "${{ matrix.arch_suffix }}" "${{ github.run_id }}-${server_id}" "$library_dir"
          done
      - name: Emby support-window smokes
        run: |
          set -euo pipefail
          compat_group_field_for_group() {
            local compat_group="$1" field="$2"
            awk -F '\t' -v want_group="$compat_group" -v want_field="$field" '
              NR == 1 {
                for (i = 1; i <= NF; i++) {
                  if ($i == want_field) field_index = i
                }
                if (field_index == 0) {
                  printf "FATAL: missing library compatibility field: %s\n", want_field > "/dev/stderr"
                  exit 2
                }
                next
              }
              $0 ~ /^[[:space:]]*($|#)/ { next }
              $1 == want_group {
                value = $field_index
              }
              END {
                if (value == "") {
                  printf "FATAL: missing library compatibility row for compat_group: %s\n", want_group > "/dev/stderr"
                  exit 1
                }
                print value
              }
            ' pins/library-compat-groups.tsv
          }
          awk -F '\t' '
            $0 ~ /^[[:space:]]*($|#)/ { next }
            $1 == "mod" { next }
            $1 == "emby" && $5 == "supported" { print $2 "\t" $3 "\t" $4 }
          ' pins/runtime-support.tsv |
          while IFS=$'\t' read -r server_id image_ref compat_group; do
            [ -n "$server_id" ] || continue
            artifact_stem="$(compat_group_field_for_group "$compat_group" artifact_stem)"
            library_dir="library-${artifact_stem}"
            [ -d "$library_dir" ] || { echo "FATAL: missing library artifact dir for compat_group=$compat_group: $library_dir" >&2; exit 1; }
            docker pull "$image_ref"
            bash tools/ci/emby-first-init-smoke.sh "$image_ref" "${{ matrix.arch_suffix }}" "${{ github.run_id }}-${server_id}" "$library_dir" "${SQLITE_VERSION_DOTTED}"
            bash tools/ci/emby-killswitch-smoke.sh "$image_ref" "${{ matrix.arch_suffix }}" "${{ github.run_id }}-${server_id}" "$library_dir" "${SQLITE_VERSION_DOTTED}"
          done
      - name: Slow-query smokes
        run: bash tools/ci/slow-query-smoke.sh "${docker_library_image}" "${{ matrix.arch_suffix }}"
      - name: Observability count check
        run: bash tests/check_obs_counts.sh
      - name: ABI obsolete config ops test
        run: bash tests/abi_obsolete_config_ops_test.sh "${docker_library_image}"

  mod-static-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run LSIO mod repo-only tests
        run: |
          set -euo pipefail
          bash tests/plex_pool_patch_lib_test.sh
          bash tests/cont_init_fragments_test.sh
          bash tests/resolve_arch_test.sh
          bash tests/manifest_parser_test.sh
          bash tests/selector_test.sh
          bash tests/selector_accessors_test.sh
          bash tests/lsio_mod_phase03_bak_creation_failure_test.sh
          bash tests/lsio_mod_emby_config_test.sh
          bash tests/render_lsio_mod_baked_pins_test.sh
          bash tests/ci_log_assertions_test.sh
          bash tests/mod_bake_assertions_test.sh
          bash tests/skopeo_mod_image_oci_static_test.sh
          bash tests/sqlite_build_workflow_mod_only_test.sh
          bash tests/docs_mod_only_direction_c_test.sh
      - name: Install test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3
          command -v shellcheck >/dev/null || sudo apt-get install -y shellcheck
      - name: Run optimize + previously-unwired repo-only tests
        run: |
          set -euo pipefail
          bash tests/check_pin_alignment_negative_test.sh
          bash tests/lsio_mod_phase03_install_failure_test.sh
          bash tests/lsio_mod_plex_poolpatch_phase_test.sh
          bash tests/lsio_mod_preflight_artifact_root_test.sh
          bash tests/lsio_mod_unsupported_phase_test.sh
          bash tests/optimize_media_servers_deflate_test.sh
          bash tests/optimize_media_servers_foreign_key_warn_test.sh
          bash tests/optimize_media_servers_fts_discovery_test.sh
          bash tests/optimize_media_servers_fts_integrity_gate_test.sh
          bash tests/optimize_media_servers_fts_rebuild_optimize_test.sh
          bash tests/optimize_media_servers_pipeline_smoke_test.sh
          bash tests/optimize_media_servers_sourcing_test.sh
          bash tests/optimize_media_servers_warn_helpers_pipefail_test.sh
          bash tests/stage_lsio_mod_baked_pins_test.sh
          bash tests/all_tests_wired_in_ci_test.sh
      - name: Shellcheck
        run: git ls-files '*.sh' | xargs -r shellcheck -S warning -x

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Load version pins
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' pins/versions.env >> "$GITHUB_ENV"
      - name: Load release compatibility summary
        id: release_compat
        run: |
          set -euo pipefail
          plex_icu_source_version="$(awk -F '\t' '
            $0 ~ /^[[:space:]]*($|#)/ { next }
            $1 == "compat_group" { next }
            $2 == "plex" {
              if (value != "") {
                print "FATAL: duplicate Plex compatibility row" > "/dev/stderr"
                exit 2
              }
              value = $6
            }
            END {
              if (value == "" || value == "-") {
                print "FATAL: missing Plex ICU source version" > "/dev/stderr"
                exit 1
              }
              print value
            }
          ' pins/library-compat-groups.tsv)"
          {
            printf 'plex_icu_source_version=%s\n' "$plex_icu_source_version"
            printf 'runtime_support_window<<EOF_RUNTIME_SUPPORT\n'
            awk -F '\t' '
              $0 ~ /^[[:space:]]*($|#)/ { next }
              $1 == "mod" { next }
              $5 == "supported" {
                printf "- mod=%s server_id=%s image_ref=%s compat_group=%s status=%s\n", $1, $2, $3, $4, $5
                found = 1
              }
              END {
                if (!found) {
                  print "FATAL: no supported runtime-support rows" > "/dev/stderr"
                  exit 1
                }
              }
            ' pins/runtime-support.tsv
            printf 'EOF_RUNTIME_SUPPORT\n'
          } >> "$GITHUB_OUTPUT"
      - name: Download sqlite artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sqlite-*
          path: release
          merge-multiple: false
          digest-mismatch: warn
      - name: Validate release tag
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          if [[ ! "${release_tag}" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-r[1-9][0-9]*$ ]]; then
            echo "FATAL: release tag does not match YYYY.MM.DD-rN: ${release_tag}" >&2
            exit 1
          fi
      - name: Archive release artifacts
        run: |
          set -euo pipefail
          cd release
          for artifact in sqlite-*-cli-*; do
            suffix="${artifact#sqlite-"${SQLITE_VERSION}"-cli-}"
            tar -czf "../sqlite-${GITHUB_REF_NAME}-cli-${suffix}.tar.gz" -C "${artifact}" .
          done
          for artifact in sqlite-*-library-*; do
            suffix="${artifact#sqlite-"${SQLITE_VERSION}"-library-}"
            if [[ "${suffix}" == plex-* ]]; then
              tar -czf "../sqlite-${GITHUB_REF_NAME}-library-${suffix}.tar.gz" \
                --exclude=icu_smoke -C "${artifact}" .
            else
              tar -czf "../sqlite-${GITHUB_REF_NAME}-library-${suffix}.tar.gz" \
                -C "${artifact}" .
            fi
          done
          cd ..
          : > SHA256SUMS
          for artifact in sqlite-*.tar.gz; do
            [ -f "$artifact" ] || continue
            sha256sum "$artifact" >> SHA256SUMS
            if [[ "$artifact" == sqlite-*-library-*.tar.gz ]]; then
              tmp="$(mktemp -d)"
              tar -C "$tmp" -xzf "$artifact"
              so_name="$(ls "$tmp"/*.so)"
              so_sha="$(sha256sum "$so_name" | awk '{print $1}')"
              printf "%s  %s\n" "$so_sha" "${artifact%.tar.gz}.so" >> SHA256SUMS
              rm -rf "$tmp"
            fi
          done
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            SQLite: ${{env.SQLITE_VERSION_DOTTED}} (upstream ${{env.SQLITE_VERSION}})
            mimalloc: ${{env.MIMALLOC_VERSION}}
            ICU (Plex variant): ${{steps.release_compat.outputs.plex_icu_source_version}}

            Runtime support window:
            ${{ steps.release_compat.outputs.runtime_support_window }}

            LSIO Docker mods (this tag):
              linuxserver-mod-sqlite3-plex
              linuxserver-mod-sqlite3-emby

            Changes: https://www.sqlite.org/changes.html
          files: |
            sqlite-${{ github.ref_name }}-*.tar.gz
            SHA256SUMS
          draft: false
          prerelease: false

  mod-build:
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - mod: plex
            runner: ubuntu-24.04
            image_name: linuxserver-mod-sqlite3-plex
            arch_suffix: amd64
          - mod: plex
            runner: ubuntu-24.04-arm
            image_name: linuxserver-mod-sqlite3-plex
            arch_suffix: arm64
          - mod: emby
            runner: ubuntu-24.04
            image_name: linuxserver-mod-sqlite3-emby
            arch_suffix: amd64
          - mod: emby
            runner: ubuntu-24.04-arm
            image_name: linuxserver-mod-sqlite3-emby
            arch_suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Load version pins
        run: grep -E '^[A-Za-z_][A-Za-z0-9_]*=' pins/versions.env >> "$GITHUB_ENV"
      - name: Set OWNER_NAME Variable
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "OWNER_NAME=$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"
      - name: Download sqlite artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sqlite-*
          path: sqlite-artifacts
          merge-multiple: false
          digest-mismatch: warn
      - name: Record support image digests
        run: |
          set -euo pipefail
          output_dir="support-image-digests-${{ matrix.mod }}-${{ matrix.arch_suffix }}"
          mkdir -p "$output_dir"
          output_file="${output_dir}/image-digests.tsv"
          printf 'mod\tserver_id\tarch_suffix\timage_ref\timage_digest\n' > "$output_file"
          awk -F '\t' -v want_mod="${{ matrix.mod }}" '
            $0 ~ /^[[:space:]]*($|#)/ { next }
            $1 == "mod" { next }
            $1 == want_mod && $5 == "supported" { print $1 "\t" $2 "\t" $3 }
          ' pins/runtime-support.tsv |
          while IFS=$'\t' read -r row_mod server_id image_ref; do
            [ -n "$row_mod" ] || continue
            docker pull "$image_ref"
            image_digest="$(docker image inspect --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{end}}' "$image_ref")"
            if [ -z "$image_digest" ]; then
              echo "FATAL: docker image inspect returned no repo digest for $image_ref" >&2
              exit 1
            fi
            printf '%s\t%s\t%s\t%s\t%s\n' \
              "$row_mod" "$server_id" "${{ matrix.arch_suffix }}" "$image_ref" "$image_digest" >> "$output_file"
          done
      - name: Upload support image digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: support-image-digests-${{ matrix.mod }}-${{ matrix.arch_suffix }}
          name: support-image-digests-${{ matrix.mod }}-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Build, bake-smoke, and export mod image
        env:
          MATRIX_ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          MATRIX_IMAGE_NAME: ${{ matrix.image_name }}
          MATRIX_MOD: ${{ matrix.mod }}
        run: bash tools/ci/mod-bake-smoke.sh "$MATRIX_MOD" "$MATRIX_IMAGE_NAME" "$MATRIX_ARCH_SUFFIX" "$GITHUB_RUN_ID" "$OWNER_NAME" "$GITHUB_REF" "$GITHUB_REF_NAME" "$SQLITE_VERSION" "$SQLITE_VERSION_DOTTED" "sqlite-artifacts"
      - name: Skopeo OCI static check
        env:
          MATRIX_ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          MATRIX_MOD: ${{ matrix.mod }}
        run: |
          set -euo pipefail
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y skopeo
          fi
          image_dir="mod-image-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}"
          IFS= read -r image_ref < "${image_dir}/image-ref.txt"
          bash tools/ci/skopeo-mod-image-oci-check.sh "$MATRIX_MOD" "$MATRIX_ARCH_SUFFIX" "${image_dir}/image.tar" "$image_ref"
      - name: Upload mod image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: mod-image-${{ matrix.mod }}-${{ matrix.arch_suffix }}
          name: mod-image-${{ matrix.mod }}-${{ matrix.arch_suffix }}
          retention-days: 90

  mod-publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [release, mod-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set OWNER_NAME Variable
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "OWNER_NAME=$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Download mod image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mod-image-*
          path: mod-images
          merge-multiple: false
          digest-mismatch: error
      - name: Promote smoked mod images
        run: |
          set -euo pipefail
          promote_image() {
            local mod="$1" arch="$2" image_dir source_ref stable_ref
            image_dir="mod-images/mod-image-${mod}-${arch}"
            docker load -i "${image_dir}/image.tar"
            source_ref="$(sed -n '1p' "${image_dir}/image-ref.txt")"
            stable_ref="ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-${mod}:${GITHUB_REF_NAME}-${arch}"
            docker tag "$source_ref" "$stable_ref"
            docker push "$stable_ref"
          }
          promote_image plex amd64
          promote_image plex arm64
          promote_image emby amd64
          promote_image emby arm64

          docker manifest create \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}-amd64" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}-arm64"
          docker manifest push "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}"

          docker manifest create \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}-amd64" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}-arm64"
          docker manifest push "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}"
