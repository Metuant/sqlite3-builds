name: Build sqlite

on:
  push:
    branches: [main]
    tags: ['[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  SQLITE_VERSION: "3530100"
  SQLITE_VERSION_DOTTED: "3.53.1"
  SQLITE_AMALG_URL: "https://www.sqlite.org/2026/sqlite-amalgamation-3530100.zip"
  SQLITE_AMALG_SHA3_256: "3c07136e4f6b5dd0c395be86455014039597bc65b6851f7111e88f71b6e06114"
  SQLITE_SRC_URL: "https://www.sqlite.org/2026/sqlite-src-3530100.zip"
  SQLITE_SRC_SHA3_256: "27cfc9264b2188fd17f811a8c03424eb65391c2ef9874cbfc860ea25f4322363"
  MIMALLOC_VERSION: "3.3.2"
  MIMALLOC_URL: "https://github.com/microsoft/mimalloc/archive/refs/tags/v3.3.2.tar.gz"
  MIMALLOC_SHA512: "226bbd51eca36d7737ce5e2edba7e0a3beeca448462a861bcbfb6726a0994bc077b4c684d7ff8b0805d71bf770e00df14f10ed598256ee54a154d8cc08e6a5c1"
  ICU_VERSION: "69.1"
  PLEX_IMAGE_TAG: "1.42.2"
  EMBY_IMAGE_TAG: "version-4.9.3.0"
  docker_cli_image: "sqlite3-cli"
  docker_library_image: "sqlite3-library"
  docker_library_plex_image: "sqlite3-library-plex"

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            march: x86-64-v2
            arch_suffix: linux-x86_64-v2
          - runner: ubuntu-24.04
            march: x86-64-v3
            arch_suffix: linux-x86_64-v3
          - runner: ubuntu-24.04-arm
            march: armv8-a
            arch_suffix: linux-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Pin alignment check
        run: bash tests/check_pin_alignment.sh
      - name: Build.sh precheck paths
        run: bash tests/check_build_sh_prechecks.sh
      - name: Build sqlite CLI
        run: sudo docker build --rm -t "${docker_cli_image}" -f docker-cli/Dockerfile . --build-arg SQLITE_AMALG_URL="${SQLITE_AMALG_URL}" --build-arg COMPRESS_SQLITE3="upx" --build-arg MARCH="${{ matrix.march }}" --build-arg SQLITE_AMALG_SHA3_256="${SQLITE_AMALG_SHA3_256}"
      - name: Extract binary from docker image
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        id: extract_cli
        with:
          image: ${{env.docker_cli_image}}
          path: /app/sqlite-amalgamation-${{env.SQLITE_VERSION}}/dist/.
          destination: cli
      - name: Upload sqlite CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.extract_cli.outputs.destination }}
          name: sqlite-${{env.SQLITE_VERSION}}-cli-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Build sqlite library
        run: sudo docker build --rm -t "${docker_library_image}" -f docker-library/Dockerfile . --build-arg SQLITE_AMALG_URL="${SQLITE_AMALG_URL}" --build-arg MARCH="${{ matrix.march }}" --build-arg SQLITE_AMALG_SHA3_256="${SQLITE_AMALG_SHA3_256}" --build-arg MIMALLOC_VERSION="${MIMALLOC_VERSION}" --build-arg MIMALLOC_URL="${MIMALLOC_URL}" --build-arg MIMALLOC_SHA512="${MIMALLOC_SHA512}"
      - name: Extract binary from docker image
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        id: extract_library
        with:
          image: ${{env.docker_library_image}}
          path: /app/sqlite-amalgamation-${{env.SQLITE_VERSION}}/dist/.
          destination: library
      - name: Upload sqlite library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.extract_library.outputs.destination }}
          name: sqlite-${{env.SQLITE_VERSION}}-library-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Build sqlite Plex library
        run: sudo docker build --rm -t "${docker_library_plex_image}" -f docker-library/Dockerfile . --build-arg SQLITE_AMALG_URL="${SQLITE_AMALG_URL}" --build-arg MARCH="${{ matrix.march }}" --build-arg SQLITE_AMALG_SHA3_256="${SQLITE_AMALG_SHA3_256}" --build-arg SQLITE_SRC_URL="${SQLITE_SRC_URL}" --build-arg SQLITE_SRC_SHA3_256="${SQLITE_SRC_SHA3_256}" --build-arg LIBRARY_VARIANT=plex --build-arg MIMALLOC_VERSION="${MIMALLOC_VERSION}" --build-arg MIMALLOC_URL="${MIMALLOC_URL}" --build-arg MIMALLOC_SHA512="${MIMALLOC_SHA512}" --build-arg ICU_VERSION="${ICU_VERSION}"
      - name: Extract Plex library from docker image
        uses: shrink/actions-docker-extract@f1ef61065b78731fe3310b4e84e511f6a927a77e # v4.0.0
        id: extract_library_plex
        with:
          image: ${{env.docker_library_plex_image}}
          path: /app/sqlite-amalgamation-${{env.SQLITE_VERSION}}/dist/.
          destination: library-plex
      - name: Upload sqlite Plex library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.extract_library_plex.outputs.destination }}
          name: sqlite-${{env.SQLITE_VERSION}}-library-plex-${{ matrix.arch_suffix }}
          retention-days: 90
      - name: Pull Plex image (ICU smoke)
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/plex:${{ env.PLEX_IMAGE_TAG }}
      - name: ICU smoke stage 2 (Plex variant against Plex's bundled ICU)
        env:
          ARTIFACT_DIR: ${{ steps.extract_library_plex.outputs.destination }}
        run: |
          set -euo pipefail
          # WHY: The Plex image pin fixes the ICU runtime ABI checked below.
          PLEX_IMG="lscr.io/linuxserver/plex:${PLEX_IMAGE_TAG}"
          EXPECTED_ICU_MAJOR="${ICU_VERSION%%.*}"
          ARTIFACT_DIR_ABS="$(realpath "$ARTIFACT_DIR")"
          PLEX_ICU_SOS=$(docker run --rm --entrypoint /bin/ls "$PLEX_IMG" \
            /usr/lib/plexmediaserver/lib/ \
            | grep '^libicu.*plex\.so\.[0-9]\+$' || true)
          if [ -z "$PLEX_ICU_SOS" ]; then
            echo "FATAL: no Plex-renamed ICU SOs found in $PLEX_IMG"; exit 1
          fi
          PLEX_ICU_MAJOR_OFFENDERS=()
          while IFS= read -r so; do
            so_major="$(printf "%s\n" "$so" | sed -n 's/.*\.so\.\([0-9]\+\)$/\1/p')"
            if [ "$so_major" != "$EXPECTED_ICU_MAJOR" ]; then
              PLEX_ICU_MAJOR_OFFENDERS+=("$so=$so_major")
            fi
          done <<< "$PLEX_ICU_SOS"
          if [ "${#PLEX_ICU_MAJOR_OFFENDERS[@]}" -gt 0 ]; then
            PLEX_ICU_MAJOR="${PLEX_ICU_MAJOR_OFFENDERS[*]}"
            echo "FATAL: Plex image $PLEX_IMG bundles ICU $PLEX_ICU_MAJOR;"
            echo "       build pinned to ICU $EXPECTED_ICU_MAJOR."
            echo "       Refresh the ICU pin, Plex build steps, and EXPECTED_ICU_MAJOR before re-running CI."
            exit 1
          fi
          if [ ! -f "$ARTIFACT_DIR_ABS/libsqlite3.so" ]; then
            echo "FATAL: missing extracted Plex library at $ARTIFACT_DIR_ABS/libsqlite3.so"
            exit 1
          fi
          if [ ! -f "$ARTIFACT_DIR_ABS/icu_smoke" ]; then
            echo "FATAL: missing extracted Plex ICU smoke binary at $ARTIFACT_DIR_ABS/icu_smoke"
            exit 1
          fi

          # WHY: Invoking Plex's bundled musl loader directly proves the smoke
          # traverses the runtime closure used by the deployed Plex library.
          docker run --rm \
            --mount "type=bind,src=${ARTIFACT_DIR_ABS}/libsqlite3.so,dst=/usr/lib/plexmediaserver/lib/libsqlite3.so,readonly" \
            --mount "type=bind,src=${ARTIFACT_DIR_ABS}/icu_smoke,dst=/tmp/icu_smoke,readonly" \
            --entrypoint /bin/bash \
            "$PLEX_IMG" \
            -c 'set -euo pipefail
                shopt -s nullglob
                plex_loaders=(/usr/lib/plexmediaserver/lib/ld-musl-*.so.1)
                if [ "${#plex_loaders[@]}" -eq 0 ]; then
                  echo "FATAL: no Plex musl loader found"
                  exit 1
                fi
                plex_loader="${plex_loaders[0]}"
                printf "Using Plex musl loader: %s\n" "$plex_loader"
                smoke_list="$("$plex_loader" --library-path /usr/lib/plexmediaserver/lib --list /tmp/icu_smoke)"
                printf "%s\n" "$smoke_list"
                printf "%s\n" "$smoke_list" | awk '"'"'/libsqlite3\.so/ && /\/usr\/lib\/plexmediaserver\/lib\/libsqlite3\.so/ { found=1 } END { exit !found }'"'"' || {
                  echo "FATAL: icu_smoke did not resolve libsqlite3.so through /usr/lib/plexmediaserver/lib/"
                  exit 1
                }
                for soname in libicuucplex.so.69 libicui18nplex.so.69 libicudataplex.so.69; do
                  printf "%s\n" "$smoke_list" | awk -v s="$soname" '"'"'$0 ~ s && $0 ~ "/usr/lib/plexmediaserver/lib/" s { found=1 } END { exit !found }'"'"' || {
                    echo "FATAL: icu_smoke did not resolve $soname through /usr/lib/plexmediaserver/lib/"
                    exit 1
                  }
                done
                "$plex_loader" --library-path /usr/lib/plexmediaserver/lib /tmp/icu_smoke' || {
            echo "FATAL: Plex ICU smoke failed; dumping musl loader lists"
            docker run --rm \
              --mount "type=bind,src=${ARTIFACT_DIR_ABS}/libsqlite3.so,dst=/usr/lib/plexmediaserver/lib/libsqlite3.so,readonly" \
              --mount "type=bind,src=${ARTIFACT_DIR_ABS}/icu_smoke,dst=/tmp/icu_smoke,readonly" \
              --entrypoint /bin/bash \
              "$PLEX_IMG" \
              -c 'set -euo pipefail
                  shopt -s nullglob
                  plex_loaders=(/usr/lib/plexmediaserver/lib/ld-musl-*.so.1)
                  if [ "${#plex_loaders[@]}" -eq 0 ]; then
                    echo "FATAL: no Plex musl loader found"
                    exit 1
                  fi
                  plex_loader="${plex_loaders[0]}"
                  printf "Using Plex musl loader: %s\n" "$plex_loader"
                  "$plex_loader" --library-path /usr/lib/plexmediaserver/lib --list /usr/lib/plexmediaserver/lib/libsqlite3.so || true
                  "$plex_loader" --library-path /usr/lib/plexmediaserver/lib --list /tmp/icu_smoke || true' || true
            exit 1
          }
      - name: Pull Plex image (PMS first-init)
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/plex:${{ env.PLEX_IMAGE_TAG }}
      - name: PMS first-init smoke (Plex)
        env:
          ARTIFACT_DIR: ${{ steps.extract_library_plex.outputs.destination }}
          PLEX_IMG: "lscr.io/linuxserver/plex:${{ env.PLEX_IMAGE_TAG }}"
          ICU_VERSION: ${{ env.ICU_VERSION }}
        run: |
          set -euo pipefail
          EXPECTED_ICU_MAJOR="${ICU_VERSION%%.*}"
          : "Plex image ${PLEX_IMG} with expected ICU major ${EXPECTED_ICU_MAJOR}"
          ARTIFACT_DIR_ABS="$(realpath "$ARTIFACT_DIR")"
          if [ ! -f "$ARTIFACT_DIR_ABS/libsqlite3.so" ]; then
            echo "FATAL: missing extracted Plex library at $ARTIFACT_DIR_ABS/libsqlite3.so"
            exit 1
          fi

          PMS_CONFIG_DIR="$(mktemp -d)"
          PMS_DB_COPY_DIR="$(mktemp -d)"
          PMS_DB_COPY="${PMS_DB_COPY_DIR}/com.plexapp.plugins.library.db"
          PMS_CONTAINER="pms-smoke-${{ github.run_id }}-${{ matrix.arch_suffix }}"
          trap 'status=$?; docker logs "$PMS_CONTAINER" 2>&1 || true; docker stop "$PMS_CONTAINER" 2>/dev/null || true; exit "$status"' EXIT

          docker run --detach \
            --name "$PMS_CONTAINER" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e VERSION=docker \
            --mount "type=bind,src=${PMS_CONFIG_DIR},dst=/config" \
            --mount "type=bind,src=${ARTIFACT_DIR_ABS}/libsqlite3.so,dst=/usr/lib/plexmediaserver/lib/libsqlite3.so,readonly" \
            --network host \
            "$PLEX_IMG"

          pms_ready=0
          for _ in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/32400' 2>/dev/null; then
              pms_ready=1
              break
            fi
            sleep 3
          done
          if [ "$pms_ready" -ne 1 ]; then
            echo "FATAL: PMS did not open TCP 32400 within 90 seconds"
            docker logs "$PMS_CONTAINER" 2>&1 || true
            exit 1
          fi

          wait_for_pms_table_count() {
            local table_count
            table_count=0
            for _ in $(seq 1 30); do
              if docker cp "${PMS_CONTAINER}:/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db" "$PMS_DB_COPY" >/dev/null 2>&1; then
                table_count="$(sqlite3 "$PMS_DB_COPY" "SELECT COUNT(*) FROM sqlite_master WHERE type='table';" 2>/dev/null || true)"
                case "$table_count" in
                  "" | *[!0-9]*) table_count=0 ;;
                esac
                if [ "$table_count" -ge 20 ]; then
                  return 0
                fi
              fi
              sleep 1
            done
            echo "FATAL: expected at least 20 PMS tables within 30 seconds, got $table_count"
            return 1
          }
          wait_for_pms_table_count

          bad_signal_re='\bSQLITE_(ERROR|INTERNAL|NOMEM|IOERR|CORRUPT|FULL|CANTOPEN|PROTOCOL|MISMATCH|MISUSE|NOTADB|FORMAT|AUTH)\b|database disk image is malformed|Cannot create table|no such function|no such collation|Failed to open'
          if docker logs "$PMS_CONTAINER" 2>&1 | grep -Ev '^\[sqlite3-builds-obs\]' | grep -E "$bad_signal_re"; then
            echo "FATAL: PMS logs contain SQLite/runtime bad signal"
            exit 1
          fi
          pms_logs="$(docker logs "$PMS_CONTAINER" 2>&1 || true)"
          if ! printf "%s\n" "$pms_logs" | grep -E '\[sqlite3-builds-obs\].*SQLITE_TRACE_STMT' >/dev/null; then
            echo "FATAL: PMS logs missing SQLITE_TRACE_STMT observability marker"
            exit 1
          fi
          pms_open_marker_count="$(printf "%s\n" "$pms_logs" | grep -Ec '\[sqlite3-builds-obs\].* sqlite3_open(_v2|16)? ' || true)"
          if [ "$pms_open_marker_count" -lt 1 ]; then
            echo "FATAL: PMS observability positive-mode marker count check failed: open=$pms_open_marker_count"
            exit 1
          fi
          echo "PMS_OPEN_MARKER_COUNT(unpatched)=${pms_open_marker_count}"
          if printf "%s\n" "$pms_logs" | grep -E '\[sqlite3-builds-obs\] .* sqlite3_config op=SQLITE_CONFIG_[A-Z0-9_]+ rc=21' >/dev/null; then
            echo "FATAL: PMS logs contain startup sqlite3_config rc=21 after lazy auto-extension registration"
            exit 1
          fi
      - name: Pull Plex image (PMS kill-switch smoke)
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/plex:${{ env.PLEX_IMAGE_TAG }}
      - name: PMS kill-switch off-state smoke
        run: |
          set -euo pipefail
          PLEX_IMG="lscr.io/linuxserver/plex:${PLEX_IMAGE_TAG}"
          ARTIFACT_DIR_ABS="$(realpath "${{ steps.extract_library_plex.outputs.destination }}")"
          if [ ! -f "$ARTIFACT_DIR_ABS/libsqlite3.so" ]; then
            echo "FATAL: missing extracted Plex library at $ARTIFACT_DIR_ABS/libsqlite3.so"
            exit 1
          fi

          PMS_CONFIG_DIR="$(mktemp -d)"
          PMS_DB_COPY_DIR="$(mktemp -d)"
          PMS_DB_COPY="${PMS_DB_COPY_DIR}/com.plexapp.plugins.library.db"
          PMS_CONTAINER="pms-obs-off-smoke-${{ github.run_id }}-${{ matrix.arch_suffix }}"
          trap 'status=$?; docker logs "$PMS_CONTAINER" 2>&1 || true; docker stop "$PMS_CONTAINER" 2>/dev/null || true; exit "$status"' EXIT

          docker run --detach \
            --name "$PMS_CONTAINER" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e VERSION=docker \
            -e SQLITE3_DISABLE_OBSERVABILITY=1 \
            --mount "type=bind,src=${PMS_CONFIG_DIR},dst=/config" \
            --mount "type=bind,src=${ARTIFACT_DIR_ABS}/libsqlite3.so,dst=/usr/lib/plexmediaserver/lib/libsqlite3.so,readonly" \
            --network host \
            "$PLEX_IMG"

          pms_ready=0
          for _ in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/localhost/32400' 2>/dev/null; then
              pms_ready=1
              break
            fi
            sleep 3
          done
          if [ "$pms_ready" -ne 1 ]; then
            echo "FATAL: PMS did not open TCP 32400 within 90 seconds"
            docker logs "$PMS_CONTAINER" 2>&1 || true
            exit 1
          fi

          wait_for_pms_table_count() {
            local table_count
            table_count=0
            for _ in $(seq 1 30); do
              if docker cp "${PMS_CONTAINER}:/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db" "$PMS_DB_COPY" >/dev/null 2>&1; then
                table_count="$(sqlite3 "$PMS_DB_COPY" "SELECT COUNT(*) FROM sqlite_master WHERE type='table';" 2>/dev/null || true)"
                case "$table_count" in
                  "" | *[!0-9]*) table_count=0 ;;
                esac
                if [ "$table_count" -ge 20 ]; then
                  return 0
                fi
              fi
              sleep 1
            done
            echo "FATAL: expected at least 20 PMS tables within 30 seconds, got $table_count"
            return 1
          }
          wait_for_pms_table_count

          docker stop "$PMS_CONTAINER" >/dev/null 2>&1 || true
          pms_logs="$(docker logs "$PMS_CONTAINER" 2>&1 || true)"
          if printf "%s\n" "$pms_logs" | grep -Fq '[sqlite3-builds-obs]'; then
            echo "FATAL: PMS observability kill switch emitted marker lines"
            exit 1
          fi
      - name: Pull Emby image (first-init smoke)
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/emby:${{ env.EMBY_IMAGE_TAG }}
      - name: Emby first-init smoke
        env:
          GENERIC_ARTIFACT_DIR: ${{ steps.extract_library.outputs.destination }}
        run: |
          set -euo pipefail
          # WHY: tag pin fixes the Emby runtime ABI checked below.
          EMBY_IMG="lscr.io/linuxserver/emby:${EMBY_IMAGE_TAG}"
          GENERIC_ARTIFACT_DIR_ABS="$(realpath "$GENERIC_ARTIFACT_DIR")"
          if [ ! -f "$GENERIC_ARTIFACT_DIR_ABS/libsqlite3.so" ]; then
            echo "FATAL: missing extracted generic library at $GENERIC_ARTIFACT_DIR_ABS/libsqlite3.so"
            exit 1
          fi

          EMBY_CONFIG_DIR="$(mktemp -d)"
          EMBY_CONTAINER="emby-smoke-${{ github.run_id }}-${{ matrix.arch_suffix }}"
          trap 'status=$?; docker logs "$EMBY_CONTAINER" 2>&1 || true; docker stop "$EMBY_CONTAINER" 2>/dev/null || true; exit "$status"' EXIT

          docker run --detach \
            --name "$EMBY_CONTAINER" \
            -e PUID=1000 \
            -e PGID=1000 \
            --mount "type=bind,src=${EMBY_CONFIG_DIR},dst=/config" \
            --mount "type=bind,src=${GENERIC_ARTIFACT_DIR_ABS}/libsqlite3.so,dst=/app/emby/lib/libsqlite3.so.3.49.2,readonly" \
            --network host \
            "$EMBY_IMG"

          sqlite_version_line=""
          emby_logs=""
          for _ in $(seq 1 30); do
            emby_logs="$(docker logs "$EMBY_CONTAINER" 2>&1 || true)"
            sqlite_version_line="$(printf "%s\n" "$emby_logs" | grep "Sqlite version:" | tail -n 1 || true)"
            if [ -n "$sqlite_version_line" ]; then
              break
            fi
            sleep 3
          done
          if [ -z "$sqlite_version_line" ]; then
            echo "FATAL: Emby did not log Sqlite version: within 90 seconds"
            docker logs "$EMBY_CONTAINER" 2>&1 || true
            exit 1
          fi

          observed_version="$(printf "%s\n" "$sqlite_version_line" | sed -n 's/.*Sqlite version:[[:space:]]*\([^[:space:]]\+\).*/\1/p')"
          expected_version="${SQLITE_VERSION_DOTTED}"
          if [ "$observed_version" != "$expected_version" ]; then
            echo "FATAL: Emby logged Sqlite version $observed_version, expected $expected_version from SQLITE_VERSION_DOTTED=${SQLITE_VERSION_DOTTED}"
            exit 1
          fi

          emby_logs="$(docker logs "$EMBY_CONTAINER" 2>&1 || true)"
          compile_options="$(printf "%s\n" "$emby_logs" | sed -n 's/.*Sqlite compiler options:[[:space:]]*//p' | tail -n 1)"
          printf "Emby Sqlite compiler options: %s\n" "$compile_options"
          if [ -z "$compile_options" ]; then
            echo "FATAL: Emby did not log Sqlite compiler options"
            exit 1
          fi

          compile_options_csv="$(printf "%s" "$compile_options" | tr -d '[:space:]')"
          compile_options_wrapped=",${compile_options_csv},"
          required_flags=(
            "DQS=1"
            "DEFAULT_WORKER_THREADS=8"
            "MAX_WORKER_THREADS=8"
            "THREADSAFE=2"
            "DEFAULT_WAL_AUTOCHECKPOINT=16000"
            "DEFAULT_JOURNAL_SIZE_LIMIT=67108864"
            "SORTER_PMASZ=8192"
            "DEFAULT_CACHE_SIZE=-1048576"
            "DEFAULT_MMAP_SIZE=34359738368"
            "MAX_MMAP_SIZE=1099511627776"
            "ENABLE_FTS3_TOKENIZER"
            "ENABLE_SETLK_TIMEOUT"
            "ENABLE_NULL_TRIM"
            "ENABLE_PERCENTILE"
            "ENABLE_FTS5"
            "ENABLE_RTREE"
          )
          missing_flags=()
          for flag in "${required_flags[@]}"; do
            if [[ "$compile_options_wrapped" != *",$flag,"* ]]; then
              missing_flags+=("$flag")
            fi
          done
          if [ "${#missing_flags[@]}" -gt 0 ]; then
            echo "FATAL: Emby Sqlite compiler options missing required flag(s): ${missing_flags[*]}"
            exit 1
          fi

          bad_signal_re='\bSQLITE_(ERROR|INTERNAL|NOMEM|IOERR|CORRUPT|FULL|CANTOPEN|PROTOCOL|MISMATCH|MISUSE|NOTADB|FORMAT|AUTH)\b|database disk image is malformed|Cannot create table|no such function|no such collation|Failed to open'
          if printf "%s\n" "$emby_logs" | grep -Ev '^\[sqlite3-builds-obs\]' | grep -E "$bad_signal_re"; then
            echo "FATAL: Emby logs contain SQLite/runtime bad signal"
            exit 1
          fi
          if ! printf "%s\n" "$emby_logs" | grep -E '\[sqlite3-builds-obs\].*SQLITE_TRACE_STMT' >/dev/null; then
            echo "FATAL: Emby logs missing SQLITE_TRACE_STMT observability marker"
            exit 1
          fi
          emby_open_marker_count="$(printf "%s\n" "$emby_logs" | grep -Ec '\[sqlite3-builds-obs\].* sqlite3_open(_v2|16)? ' || true)"
          if [ "$emby_open_marker_count" -lt 1 ]; then
            echo "FATAL: Emby observability positive-mode marker count check failed: open=$emby_open_marker_count"
            exit 1
          fi
          if printf "%s\n" "$emby_logs" | grep -E '\[sqlite3-builds-obs\] .* sqlite3_config op=SQLITE_CONFIG_[A-Z0-9_]+ rc=21' >/dev/null; then
            echo "FATAL: Emby logs contain startup sqlite3_config rc=21 after lazy auto-extension registration"
            exit 1
          fi
      - name: Slow-query positive smoke
        run: |
          set -euo pipefail
          out=""
          set +e
          out="$(docker run --rm "${docker_library_image}" /bin/sh -c '
            LIB_DIR=$(dirname "$(ls /app/sqlite-amalgamation-*/dist/libsqlite3.so)")
            LD_LIBRARY_PATH="$LIB_DIR" /app/slow_query_smoke
          ' 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            printf "%s\n" "$out"
            exit "$status"
          fi
          printf "%s\n" "$out"
          if ! grep -Fq 'slow query smoke passed' <<<"$out"; then
            echo "FATAL: slow-query smoke did not report success"
            exit 1
          fi
          if ! grep -E '\[sqlite3-builds-obs\].* slow_query ' <<<"$out" >/dev/null; then
            echo "FATAL: slow-query smoke missing slow_query marker"
            exit 1
          fi
      - name: Slow-query disabled-mode smoke
        run: |
          set -euo pipefail
          out=""
          set +e
          out="$(docker run --rm \
            -e SQLITE3_SLOW_QUERY_THRESHOLD_MS=0 \
            -e SQLITE3_DISABLE_SLOW_QUERY=1 \
            "${docker_library_image}" \
            /bin/sh -c '
              LIB_DIR=$(dirname "$(ls /app/sqlite-amalgamation-*/dist/libsqlite3.so)")
              LD_LIBRARY_PATH="$LIB_DIR" /app/slow_query_smoke child-kill
            ' 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            printf "%s\n" "$out"
            exit "$status"
          fi
          printf "%s\n" "$out"
          if ! grep -E '\[sqlite3-builds-obs\].*SQLITE_TRACE_STMT' <<<"$out" >/dev/null; then
            echo "FATAL: slow-query disabled-mode smoke missing SQLITE_TRACE_STMT marker"
            exit 1
          fi
          if grep -E '\[sqlite3-builds-obs\].* slow_query(_stats)?( |$)' <<<"$out" >/dev/null; then
            echo "FATAL: slow-query disabled-mode smoke emitted slow_query output"
            exit 1
          fi
      - name: Slow-query atexit smoke
        run: |
          set -euo pipefail
          out=""
          set +e
          out="$(docker run --rm "${docker_library_image}" /bin/sh -c '
            LIB_DIR=$(dirname "$(ls /app/sqlite-amalgamation-*/dist/libsqlite3.so)")
            LD_LIBRARY_PATH="$LIB_DIR" /app/slow_query_atexit_smoke
          ' 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            printf "%s\n" "$out"
            exit "$status"
          fi
          printf "%s\n" "$out"
          if ! grep -E '\[sqlite3-builds-obs\].*(slow_query_stats|dump_skipped)' <<<"$out" >/dev/null; then
            echo "FATAL: slow-query atexit smoke missing stats or contention diagnostic"
            exit 1
          fi
      - name: Slow-query concurrency smoke
        run: |
          set -euo pipefail
          out=""
          set +e
          out="$(docker run --rm "${docker_library_image}" /bin/sh -c '
            LIB_DIR=$(dirname "$(ls /app/sqlite-amalgamation-*/dist/libsqlite3.so)")
            LD_LIBRARY_PATH="$LIB_DIR" /app/slow_query_concurrency_smoke
          ' 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            printf "%s\n" "$out"
            exit "$status"
          fi
          printf "%s\n" "$out"
          if ! grep -Fq 'slow query concurrency smoke passed' <<<"$out"; then
            echo "FATAL: slow-query concurrency smoke did not report success"
            exit 1
          fi
      - name: Pull Emby image (kill-switch smoke)
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/emby:${{ env.EMBY_IMAGE_TAG }}
      - name: Emby kill-switch off-state smoke
        run: |
          set -euo pipefail
          EMBY_IMG="lscr.io/linuxserver/emby:${EMBY_IMAGE_TAG}"
          GENERIC_ARTIFACT_DIR_ABS="$(realpath "${{ steps.extract_library.outputs.destination }}")"
          if [ ! -f "$GENERIC_ARTIFACT_DIR_ABS/libsqlite3.so" ]; then
            echo "FATAL: missing extracted generic library at $GENERIC_ARTIFACT_DIR_ABS/libsqlite3.so"
            exit 1
          fi

          EMBY_CONFIG_DIR="$(mktemp -d)"
          EMBY_CONTAINER="emby-obs-off-smoke-${{ github.run_id }}-${{ matrix.arch_suffix }}"
          trap 'status=$?; docker logs "$EMBY_CONTAINER" 2>&1 || true; docker stop "$EMBY_CONTAINER" 2>/dev/null || true; exit "$status"' EXIT

          docker run --detach \
            --name "$EMBY_CONTAINER" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e SQLITE3_DISABLE_OBSERVABILITY=1 \
            --mount "type=bind,src=${EMBY_CONFIG_DIR},dst=/config" \
            --mount "type=bind,src=${GENERIC_ARTIFACT_DIR_ABS}/libsqlite3.so,dst=/app/emby/lib/libsqlite3.so.3.49.2,readonly" \
            --network host \
            "$EMBY_IMG"

          sqlite_version_line=""
          emby_logs=""
          for _ in $(seq 1 30); do
            emby_logs="$(docker logs "$EMBY_CONTAINER" 2>&1 || true)"
            sqlite_version_line="$(printf "%s\n" "$emby_logs" | grep "Sqlite version:" | tail -n 1 || true)"
            if [ -n "$sqlite_version_line" ]; then
              break
            fi
            sleep 3
          done
          if [ -z "$sqlite_version_line" ]; then
            echo "FATAL: Emby did not log Sqlite version: within 90 seconds"
            docker logs "$EMBY_CONTAINER" 2>&1 || true
            exit 1
          fi

          observed_version="$(printf "%s\n" "$sqlite_version_line" | sed -n 's/.*Sqlite version:[[:space:]]*\([^[:space:]]\+\).*/\1/p')"
          expected_version="${SQLITE_VERSION_DOTTED}"
          if [ "$observed_version" != "$expected_version" ]; then
            echo "FATAL: Emby logged Sqlite version $observed_version, expected $expected_version from SQLITE_VERSION_DOTTED=${SQLITE_VERSION_DOTTED}"
            exit 1
          fi

          docker stop "$EMBY_CONTAINER" >/dev/null 2>&1 || true
          emby_logs="$(docker logs "$EMBY_CONTAINER" 2>&1 || true)"
          if printf "%s\n" "$emby_logs" | grep -Fq '[sqlite3-builds-obs]'; then
            echo "FATAL: Emby observability kill switch emitted marker lines"
            exit 1
          fi
      - name: Observability count check
        run: bash tests/check_obs_counts.sh
      - name: ABI obsolete config ops test
        run: bash tests/abi_obsolete_config_ops_test.sh "${docker_library_image}"

  mod-static-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run LSIO mod repo-only tests
        run: |
          set -euo pipefail
          bash tests/plex_pool_patch_lib_test.sh
          bash tests/cont_init_fragments_test.sh
          bash tests/lsio_mod_phase03_bak_creation_failure_test.sh
          bash tests/lsio_mod_emby_config_test.sh
          bash tests/render_lsio_mod_baked_pins_test.sh
          bash tests/sqlite_build_workflow_mod_only_test.sh
          bash tests/docs_mod_only_direction_c_test.sh

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download sqlite artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sqlite-*
          path: release
          merge-multiple: false
          digest-mismatch: warn
      - name: Validate release tag
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          if [[ ! "${release_tag}" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-r[1-9][0-9]*$ ]]; then
            echo "FATAL: release tag does not match YYYY.MM.DD-rN: ${release_tag}" >&2
            exit 1
          fi
      - name: Archive release artifacts
        run: |
          set -euo pipefail
          cd release
          for artifact in sqlite-*-cli-*; do
            suffix="${artifact#sqlite-"${SQLITE_VERSION}"-cli-}"
            tar -czf "../sqlite-${GITHUB_REF_NAME}-cli-${suffix}.tar.gz" -C "${artifact}" .
          done
          for artifact in sqlite-*-library-*; do
            suffix="${artifact#sqlite-"${SQLITE_VERSION}"-library-}"
            if [[ "${suffix}" == plex-* ]]; then
              tar -czf "../sqlite-${GITHUB_REF_NAME}-library-${suffix}.tar.gz" \
                --exclude=icu_smoke -C "${artifact}" .
            else
              tar -czf "../sqlite-${GITHUB_REF_NAME}-library-${suffix}.tar.gz" \
                -C "${artifact}" .
            fi
          done
          cd ..
          : > SHA256SUMS
          for artifact in sqlite-*.tar.gz; do
            [ -f "$artifact" ] || continue
            sha256sum "$artifact" >> SHA256SUMS
            if [[ "$artifact" == sqlite-*-library-*.tar.gz ]]; then
              tmp="$(mktemp -d)"
              tar -C "$tmp" -xzf "$artifact"
              so_name="$(ls "$tmp"/*.so)"
              so_sha="$(sha256sum "$so_name" | awk '{print $1}')"
              printf "%s  %s\n" "$so_sha" "${artifact%.tar.gz}.so" >> SHA256SUMS
              rm -rf "$tmp"
            fi
          done
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            SQLite: ${{env.SQLITE_VERSION_DOTTED}} (upstream ${{env.SQLITE_VERSION}})
            mimalloc: ${{env.MIMALLOC_VERSION}}
            ICU (Plex variant): ${{env.ICU_VERSION}}

            Base image baselines:
              Plex: ${{env.PLEX_IMAGE_TAG}}
              Emby: ${{env.EMBY_IMAGE_TAG}}

            LSIO Docker mods (this tag):
              linuxserver-mod-sqlite3-plex
              linuxserver-mod-sqlite3-emby

            Changes: https://www.sqlite.org/changes.html
          files: |
            sqlite-${{ github.ref_name }}-*.tar.gz
            SHA256SUMS
          draft: false
          prerelease: false

  mod-build:
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - mod: plex
            runner: ubuntu-24.04
            image_name: linuxserver-mod-sqlite3-plex
            arch_suffix: amd64
          - mod: plex
            runner: ubuntu-24.04-arm
            image_name: linuxserver-mod-sqlite3-plex
            arch_suffix: arm64
          - mod: emby
            runner: ubuntu-24.04
            image_name: linuxserver-mod-sqlite3-emby
            arch_suffix: amd64
          - mod: emby
            runner: ubuntu-24.04-arm
            image_name: linuxserver-mod-sqlite3-emby
            arch_suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set OWNER_NAME Variable
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "OWNER_NAME=$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"
      - name: Download sqlite artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sqlite-*
          path: sqlite-artifacts
          merge-multiple: false
          digest-mismatch: warn
      - name: Pull Plex base image
        if: matrix.mod == 'plex'
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/plex:${{ env.PLEX_IMAGE_TAG }}
      - name: Pull Emby base image
        if: matrix.mod == 'emby'
        uses: ./.github/actions/retry-pull
        with:
          image: lscr.io/linuxserver/emby:${{ env.EMBY_IMAGE_TAG }}
      - name: Build, bake-smoke, and export mod image
        env:
          MATRIX_ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          MATRIX_IMAGE_NAME: ${{ matrix.image_name }}
          MATRIX_MOD: ${{ matrix.mod }}
        run: |
          set -euo pipefail
          case "$MATRIX_MOD" in
            plex)
              lsio_image="lscr.io/linuxserver/plex:${PLEX_IMAGE_TAG}"
              target_path="/usr/lib/plexmediaserver/lib/libsqlite3.so"
              artifact_kind="library-plex"
              ;;
            emby)
              lsio_image="lscr.io/linuxserver/emby:${EMBY_IMAGE_TAG}"
              target_path="/app/emby/lib/libsqlite3.so.3.49.2"
              artifact_kind="library"
              ;;
            *)
              echo "FATAL: unsupported mod: $MATRIX_MOD" >&2
              exit 1
              ;;
          esac
          case "$MATRIX_ARCH_SUFFIX" in
            amd64) runtime_arches=(linux-x86_64-v2 linux-x86_64-v3); expected_arch_re='arch=linux-x86_64-v(2|3)' ;;
            arm64) runtime_arches=(linux-arm64); expected_arch_re='arch=linux-arm64' ;;
            *)
              echo "FATAL: unsupported arch suffix: $MATRIX_ARCH_SUFFIX" >&2
              exit 1
              ;;
          esac
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            mod_release_tag="$GITHUB_REF_NAME"
          else
            mod_release_tag="run-${GITHUB_RUN_ID}"
          fi

          tmpdir="$(mktemp -d)"
          staged="${tmpdir}/staged"
          pre_fragment="${tmpdir}/pre-fragment.txt"
          sha256sums="${tmpdir}/SHA256SUMS"
          baked_pins="${tmpdir}/baked-pins.txt"
          : > "$pre_fragment"
          : > "$sha256sums"

          image_digest="$(docker image inspect --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{end}}' "$lsio_image")"
          if [ -z "$image_digest" ]; then
            echo "FATAL: docker image inspect returned no repo digest for $lsio_image" >&2
            exit 1
          fi
          emit_pre_row() {
            local target="$1" arch="$2" image="$3" digest="$4" path="$5" pre_sha
            pre_sha="$(docker run --rm --entrypoint sha256sum "$image" "$path" | awk '{print $1}')"
            [[ "$pre_sha" =~ ^[0-9A-Fa-f]{64}$ ]] || {
              echo "FATAL: invalid runtime SHA for $path from $image: $pre_sha" >&2
              exit 1
            }
            printf 'pre|1|%s|%s|%s|%s|%s|runtime|%s\n' \
              "$target" "$arch" "$image" "$digest" "$path" "$pre_sha" >> "$pre_fragment"
          }
          for arch in "${runtime_arches[@]}"; do
            emit_pre_row "$MATRIX_MOD" "$arch" "$lsio_image" "$image_digest" "$target_path"
            if [ "$MATRIX_MOD" = "plex" ]; then
              emit_pre_row plex "$arch" "$lsio_image" "$image_digest" /usr/lib/plexmediaserver/lib/libicuucplex.so.69
              emit_pre_row plex "$arch" "$lsio_image" "$image_digest" /usr/lib/plexmediaserver/lib/libicui18nplex.so.69
              emit_pre_row plex "$arch" "$lsio_image" "$image_digest" /usr/lib/plexmediaserver/lib/libicudataplex.so.69
            fi
          done

          render_args=()
          stage_args=()
          for arch in "${runtime_arches[@]}"; do
            artifact_dir="sqlite-artifacts/sqlite-${SQLITE_VERSION}-${artifact_kind}-${arch}"
            artifact_path="${artifact_dir}/libsqlite3.so"
            artifact_name="sqlite-${mod_release_tag}-${artifact_kind}-${arch}.so"
            if [ ! -f "$artifact_path" ]; then
              echo "FATAL: missing sqlite artifact: $artifact_path" >&2
              exit 1
            fi
            artifact_sha="$(sha256sum "$artifact_path" | awk '{print $1}')"
            printf '%s  %s\n' "$artifact_sha" "$artifact_name" >> "$sha256sums"
            render_args+=(--artifact "${arch}:${artifact_name}:${artifact_path}:${target_path}")
            stage_args+=(--artifact "${arch}:${artifact_path}")
          done

          if [ "$MATRIX_MOD" = "plex" ]; then
            bash tools/render-lsio-mod-baked-pins.sh \
              --mod plex \
              --release-tag "$mod_release_tag" \
              --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --sha256sums "$sha256sums" \
              --pre-fragment "$pre_fragment" \
              --pool-baselines pins/plex-pool-patch-baselines.txt \
              --output "$baked_pins" \
              "${render_args[@]}"
            bash tools/stage-lsio-mod.sh \
              --mod plex \
              --output-dir "$staged" \
              --baked-pins "$baked_pins" \
              "${stage_args[@]}"
          else
            bash tools/render-lsio-mod-baked-pins.sh \
              --mod emby \
              --release-tag "$mod_release_tag" \
              --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --sha256sums "$sha256sums" \
              --pre-fragment "$pre_fragment" \
              --output "$baked_pins" \
              "${render_args[@]}"
            bash tools/stage-lsio-mod.sh \
              --mod emby \
              --output-dir "$staged" \
              --baked-pins "$baked_pins" \
              "${stage_args[@]}"
          fi

          if [ ! -d "$staged/root-fs/etc/s6-overlay/s6-rc.d" ]; then
            echo "FATAL: staged mod is missing native s6-rc init-mod tree" >&2
            exit 1
          fi
          legacy_init_dir="${staged}/root-fs/etc/cont"'-init.d'
          if [ -d "$legacy_init_dir" ]; then
            echo "FATAL: staged mod still contains legacy init scripts" >&2
            exit 1
          fi

          smoke_ref="ghcr.io/${OWNER_NAME}/${MATRIX_IMAGE_NAME}:${GITHUB_RUN_ID}-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}-smoke"
          mod_ref="ghcr.io/${OWNER_NAME}/${MATRIX_IMAGE_NAME}:${GITHUB_RUN_ID}-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}"
          # Why: mod-build has no registry credentials, so smoke bakes root-fs into a derived image instead of coupling validation to post-publish install flow.
          printf 'FROM %s\nCOPY root-fs /\n' "$lsio_image" > "${tmpdir}/Dockerfile.smoke"
          docker build --rm -t "$smoke_ref" -f "${tmpdir}/Dockerfile.smoke" "$staged"
          docker build --rm -t "$mod_ref" "$staged"

          smoke_container="sqlite-mod-smoke-${GITHUB_RUN_ID}-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}"
          run1_logs="${tmpdir}/smoke-run1.log"
          run2_logs="${tmpdir}/smoke-run2.log"
          run3_logs="${tmpdir}/smoke-run3.log"
          bad_signal_re='\bSQLITE_(ERROR|INTERNAL|NOMEM|IOERR|CORRUPT|FULL|CANTOPEN|PROTOCOL|MISMATCH|MISUSE|NOTADB|FORMAT|AUTH)\b|database disk image is malformed|Cannot create table|no such function|no such collation|Failed to open'

          write_log_slice() {
            local cursor="$1" output="$2"
            # Use a line-count cursor instead of --since so same-second restarts cannot bleed terminal markers across slices.
            docker logs "$smoke_container" 2>&1 | tail -n +$((cursor + 1)) > "$output" || true
          }

          debug_cat() {
            local file="$1"
            if [ -n "${RUNNER_DEBUG:-}" ]; then
              cat "$file"
            fi
          }

          capture_log_cursor() {
            docker logs "$smoke_container" 2>&1 | wc -l | tr -d ' '
          }

          require_grep() {
            local needle="$1" file="$2" message="$3"
            if grep -Fq "$needle" "$file"; then
              return 0
            fi
            cat "$file"
            echo "$message" >&2
            exit 1
          }

          require_egrep() {
            local pattern="$1" file="$2" message="$3"
            if grep -Eq "$pattern" "$file"; then
              return 0
            fi
            cat "$file"
            echo "$message" >&2
            exit 1
          }

          reject_grep() {
            local needle="$1" file="$2" message="$3"
            if grep -Fq "$needle" "$file"; then
              cat "$file"
              echo "$message" >&2
              exit 1
            fi
          }

          fixed_count() {
            local needle="$1" file="$2"
            awk -v needle="$needle" 'index($0, needle) { count++ } END { print count + 0 }' "$file"
          }

          wait_for_slice_marker() {
            local cursor="$1" slice="$2" marker="$3" run_label="$4"
            local ready=0
            for _ in $(seq 1 30); do
              write_log_slice "$cursor" "$slice"
              if grep -Fq "$marker" "$slice"; then
                ready=1
                break
              fi
              sleep 3
            done
            if [ "$ready" -ne 1 ]; then
              cat "$slice"
              echo "FATAL: LSIO mod bake-in smoke did not reach ${run_label} terminal marker: ${marker}" >&2
              exit 1
            fi
          }

          wait_for_plex_slice() {
            local cursor="$1" slice="$2" run_label="$3" pool_marker="$4"
            local ready=0
            for _ in $(seq 1 30); do
              write_log_slice "$cursor" "$slice"
              if grep -Fq "$pool_marker" "$slice"; then
                if [ "$MATRIX_ARCH_SUFFIX" = "arm64" ] || grep -Fq 'mod=plex phase=04-pool-patch event=complete' "$slice"; then
                  ready=1
                  break
                fi
              fi
              sleep 3
            done
            if [ "$ready" -ne 1 ]; then
              cat "$slice"
              echo "FATAL: LSIO mod bake-in smoke did not reach ${run_label} terminal marker: ${pool_marker}" >&2
              exit 1
            fi
          }

          assert_component_present() {
            local slice="$1" run_label="$2"
            if grep -Fq 'component=sqlite3-lsio-mod' "$slice"; then
              return 0
            fi
            cat "$slice"
            if [ "$run_label" = "run 2" ]; then
              echo "FATAL: init-mod SQLite phase chain did not re-run on restart (3-run lifecycle assumption violated)" >&2
            else
              echo "FATAL: LSIO mod markers missing from ${run_label} log slice" >&2
            fi
            exit 1
          }

          assert_no_bad_signal() {
            local slice="$1" run_label="$2"
            if grep -Ev '^\[sqlite3-builds-obs\]' "$slice" | grep -E "$bad_signal_re"; then
              echo "FATAL: LSIO mod smoke ${run_label} logs contain SQLite/runtime bad signal" >&2
              exit 1
            fi
          }

          assert_common_run() {
            local slice="$1" run_label="$2"
            assert_component_present "$slice" "$run_label"
            require_egrep "$expected_arch_re" "$slice" "FATAL: ${run_label} log slice missing expected architecture marker"
            assert_no_bad_signal "$slice" "$run_label"
          }

          assert_swap_run() {
            local slice="$1" run_label="$2" expected="$3"
            if [ "$expected" = "installed" ]; then
              require_grep 'event=installed' "$slice" "FATAL: ${run_label} missing first-apply install marker"
            else
              require_grep 'event=skip-already-current' "$slice" "FATAL: ${run_label} missing already-current swap marker"
              reject_grep 'event=installed' "$slice" "FATAL: ${run_label} unexpectedly reinstalled SQLite instead of skipping already-current"
            fi
          }

          assert_runtime_load() {
            local slice="$1" run_label="$2"
            local open_marker_count
            if [ "$MATRIX_MOD" = "emby" ]; then
              local sqlite_version_line observed_version expected_version
              sqlite_version_line="$(grep 'Sqlite version:' "$slice" | tail -n 1 || true)"
              if [ -z "$sqlite_version_line" ]; then
                cat "$slice"
                echo "FATAL: ${run_label} Emby did not log Sqlite version after app readiness" >&2
                exit 1
              fi
              observed_version="$(printf "%s\n" "$sqlite_version_line" | sed -n 's/.*Sqlite version:[[:space:]]*\([^[:space:]]\+\).*/\1/p')"
              expected_version="${SQLITE_VERSION_DOTTED}"
              if [ "$observed_version" != "$expected_version" ]; then
                cat "$slice"
                echo "FATAL: ${run_label} Emby logged Sqlite version ${observed_version}, expected ${expected_version}" >&2
                exit 1
              fi
              require_grep 'MAX_MMAP_SIZE=1099511627776' "$slice" "FATAL: ${run_label} Emby logs missing tuned MAX_MMAP_SIZE compile option"
            fi

            require_egrep '\[sqlite3-builds-obs\].*SQLITE_TRACE_STMT' "$slice" "FATAL: ${run_label} ${MATRIX_MOD} logs missing SQLITE_TRACE_STMT observability marker"
            open_marker_count="$(grep -Ec '\[sqlite3-builds-obs\].* sqlite3_open(_v2|16)? ' "$slice" || true)"
            if [ "$open_marker_count" -lt 1 ]; then
              cat "$slice"
              echo "FATAL: ${run_label} ${MATRIX_MOD} observability open marker count check failed: open=${open_marker_count}" >&2
              exit 1
            fi
            if grep -E '\[sqlite3-builds-obs\] .* sqlite3_config op=SQLITE_CONFIG_[A-Z0-9_]+ rc=21' "$slice" >/dev/null; then
              cat "$slice"
              echo "FATAL: ${run_label} ${MATRIX_MOD} logs contain startup sqlite3_config rc=21 after lazy auto-extension registration" >&2
              exit 1
            fi
          }

          assert_plex_run() {
            local slice="$1" run_label="$2" expected_swap="$3"
            assert_common_run "$slice" "$run_label"
            assert_swap_run "$slice" "$run_label" "$expected_swap"
            if [ "$MATRIX_ARCH_SUFFIX" = "amd64" ]; then
              if [ "$expected_swap" = "installed" ]; then
                require_grep 'pool_patch event=patched' "$slice" "FATAL: ${run_label} missing Plex pool patch apply marker"
              else
                require_grep 'pool_patch event=already-patched' "$slice" "FATAL: ${run_label} missing Plex pool already-patched marker"
                reject_grep 'pool_patch event=patched' "$slice" "FATAL: ${run_label} unexpectedly re-applied Plex pool patch"
              fi
            else
              require_grep 'event=pool-patch-deferred' "$slice" "FATAL: ${run_label} missing Plex arm64 pool-patch-deferred marker"
            fi
          }

          emby_tag_forms() {
            case "$1" in
              MaxLibraryDbConnections) printf '%s\n%s\n' MaxLibraryDbConnections MaxLibraryDatabaseConnections ;;
              MaxAuthDbConnections) printf '%s\n%s\n' MaxAuthDbConnections MaxAuthDatabaseConnections ;;
              MaxOtherDbConnections) printf '%s\n%s\n' MaxOtherDbConnections MaxOtherDatabaseConnections ;;
              EnableSqLiteMmio) printf '%s\n' EnableSqLiteMmio ;;
              *)
                echo "FATAL: unsupported Emby config tag: $1" >&2
                exit 1
                ;;
            esac
          }

          assert_emby_tag_transition() {
            local slice="$1" tag="$2" run_label="$3"
            local updated_count already_count missing_count total actual_tag
            updated_count=0
            already_count=0
            while IFS= read -r actual_tag; do
              updated_count=$((updated_count + $(fixed_count "event=config-updated tag=${actual_tag}" "$slice")))
              already_count=$((already_count + $(fixed_count "event=config-already-set tag=${actual_tag}" "$slice")))
              reject_grep "event=config-write-failed tag=${actual_tag}" "$slice" "FATAL: ${run_label} Emby config write failed for ${actual_tag}"
            done < <(emby_tag_forms "$tag")
            missing_count="$(fixed_count "event=missing-element tag=${tag}" "$slice")"
            total=$((updated_count + already_count + missing_count))
            if [ "$total" -ne 1 ]; then
              cat "$slice"
              echo "FATAL: ${run_label} Emby tag ${tag} expected exactly one config-updated/config-already-set/missing-element marker, found ${total}" >&2
              exit 1
            fi
          }

          assert_emby_run3_idempotent() {
            local slice="$1"
            local tag actual_tag total
            for tag in MaxLibraryDbConnections MaxAuthDbConnections MaxOtherDbConnections EnableSqLiteMmio; do
              total="$(fixed_count "event=missing-element tag=${tag}" "$slice")"
              while IFS= read -r actual_tag; do
                reject_grep "event=config-updated tag=${actual_tag}" "$slice" "FATAL: run 3 Emby config updated ${actual_tag} instead of staying idempotent"
                reject_grep "event=config-write-failed tag=${actual_tag}" "$slice" "FATAL: run 3 Emby config write failed for ${actual_tag}"
                total=$((total + $(fixed_count "event=config-already-set tag=${actual_tag}" "$slice")))
              done < <(emby_tag_forms "$tag")
              if [ "$total" -ne 1 ]; then
                cat "$slice"
                echo "FATAL: run 3 Emby tag ${tag} expected exactly one config-already-set/missing-element marker, found ${total}" >&2
                exit 1
              fi
            done
          }

          wait_for_emby_system_xml() {
            local ready=0
            for _ in $(seq 1 40); do
              if docker exec --user 0:0 "$smoke_container" test -f /config/config/system.xml; then
                ready=1
                break
              fi
              sleep 3
            done
            if [ "$ready" -ne 1 ]; then
              echo "FATAL: Emby did not generate /config/config/system.xml within 120s" >&2
              docker exec --user 0:0 "$smoke_container" ls -la /config || true
              docker exec --user 0:0 "$smoke_container" ls -la /config/config || true
              docker exec --user 0:0 "$smoke_container" cat /config/config/system.xml 2>/dev/null || true
              exit 1
            fi
          }

          wait_for_tcp_port() {
            local port="$1" run_label="$2"
            local ready=0
            for _ in $(seq 1 60); do
              if docker exec --user 0:0 "$smoke_container" bash -c "echo > /dev/tcp/127.0.0.1/${port}" 2>/dev/null; then
                ready=1
                break
              fi
              sleep 3
            done
            if [ "$ready" -ne 1 ]; then
              echo "FATAL: ${run_label} app did not accept TCP on port ${port} within 180s" >&2
              exit 1
            fi
          }

          trap 'docker logs "$smoke_container" 2>&1 || true; docker rm -f "$smoke_container" >/dev/null 2>&1 || true' EXIT

          log_cursor=0
          docker run --detach \
            --name "$smoke_container" \
            -e PUID=1000 \
            -e PGID=1000 \
            "$smoke_ref"
          if [ "$MATRIX_MOD" = "plex" ]; then
            if [ "$MATRIX_ARCH_SUFFIX" = "amd64" ]; then
              wait_for_plex_slice "$log_cursor" "$run1_logs" "run 1" 'pool_patch event=patched'
            else
              wait_for_plex_slice "$log_cursor" "$run1_logs" "run 1" 'event=pool-patch-deferred'
            fi
            wait_for_slice_marker "$log_cursor" "$run1_logs" '[ls.io-init] done.' "run 1"
            wait_for_tcp_port 32400 "run 1"
            write_log_slice "$log_cursor" "$run1_logs"
            debug_cat "$run1_logs"
            assert_plex_run "$run1_logs" "run 1" installed
            assert_runtime_load "$run1_logs" "run 1"
          else
            wait_for_slice_marker "$log_cursor" "$run1_logs" 'mod=emby phase=04-config event=missing-config' "run 1"
            wait_for_slice_marker "$log_cursor" "$run1_logs" '[ls.io-init] done.' "run 1"
            wait_for_tcp_port 8096 "run 1"
            docker exec --user 0:0 "$smoke_container" test -f /config/config/system.xml || wait_for_emby_system_xml
            write_log_slice "$log_cursor" "$run1_logs"
            debug_cat "$run1_logs"
            assert_common_run "$run1_logs" "run 1"
            assert_swap_run "$run1_logs" "run 1" installed
            require_grep 'mod=emby phase=04-config event=missing-config' "$run1_logs" "FATAL: run 1 missing Emby initial missing-config marker"
            assert_runtime_load "$run1_logs" "run 1"
          fi

          log_cursor="$(capture_log_cursor)"
          docker stop -t 60 "$smoke_container" >/dev/null
          docker start "$smoke_container" >/dev/null
          if [ "$MATRIX_MOD" = "plex" ]; then
            if [ "$MATRIX_ARCH_SUFFIX" = "amd64" ]; then
              wait_for_plex_slice "$log_cursor" "$run2_logs" "run 2" 'pool_patch event=already-patched'
            else
              wait_for_plex_slice "$log_cursor" "$run2_logs" "run 2" 'event=pool-patch-deferred'
            fi
            wait_for_slice_marker "$log_cursor" "$run2_logs" '[ls.io-init] done.' "run 2"
            wait_for_tcp_port 32400 "run 2"
            write_log_slice "$log_cursor" "$run2_logs"
            debug_cat "$run2_logs"
            assert_plex_run "$run2_logs" "run 2" skip
            assert_runtime_load "$run2_logs" "run 2"
          else
            wait_for_slice_marker "$log_cursor" "$run2_logs" 'mod=emby phase=04-config event=complete' "run 2"
            wait_for_tcp_port 8096 "run 2"
            write_log_slice "$log_cursor" "$run2_logs"
            debug_cat "$run2_logs"
            assert_common_run "$run2_logs" "run 2"
            assert_swap_run "$run2_logs" "run 2" skip
            for tag in MaxLibraryDbConnections MaxAuthDbConnections MaxOtherDbConnections EnableSqLiteMmio; do
              assert_emby_tag_transition "$run2_logs" "$tag" "run 2"
            done
            assert_runtime_load "$run2_logs" "run 2"
          fi

          log_cursor="$(capture_log_cursor)"
          docker stop -t 60 "$smoke_container" >/dev/null
          docker start "$smoke_container" >/dev/null
          if [ "$MATRIX_MOD" = "plex" ]; then
            if [ "$MATRIX_ARCH_SUFFIX" = "amd64" ]; then
              wait_for_plex_slice "$log_cursor" "$run3_logs" "run 3" 'pool_patch event=already-patched'
            else
              wait_for_plex_slice "$log_cursor" "$run3_logs" "run 3" 'event=pool-patch-deferred'
            fi
            wait_for_slice_marker "$log_cursor" "$run3_logs" '[ls.io-init] done.' "run 3"
            wait_for_tcp_port 32400 "run 3"
            write_log_slice "$log_cursor" "$run3_logs"
            debug_cat "$run3_logs"
            assert_plex_run "$run3_logs" "run 3" skip
            assert_runtime_load "$run3_logs" "run 3"
          else
            wait_for_slice_marker "$log_cursor" "$run3_logs" 'mod=emby phase=04-config event=complete' "run 3"
            wait_for_tcp_port 8096 "run 3"
            write_log_slice "$log_cursor" "$run3_logs"
            debug_cat "$run3_logs"
            assert_common_run "$run3_logs" "run 3"
            assert_swap_run "$run3_logs" "run 3" skip
            assert_emby_run3_idempotent "$run3_logs"
            assert_runtime_load "$run3_logs" "run 3"
          fi

          docker rm -f "$smoke_container" >/dev/null 2>&1 || true
          trap - EXIT

          mkdir -p "mod-image-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}"
          docker save "$mod_ref" -o "mod-image-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}/image.tar"
          printf '%s\n' "$mod_ref" > "mod-image-${MATRIX_MOD}-${MATRIX_ARCH_SUFFIX}/image-ref.txt"
      - name: Upload mod image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: mod-image-${{ matrix.mod }}-${{ matrix.arch_suffix }}
          name: mod-image-${{ matrix.mod }}-${{ matrix.arch_suffix }}
          retention-days: 90

  mod-publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [release, mod-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set OWNER_NAME Variable
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "OWNER_NAME=$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Download mod image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mod-image-*
          path: mod-images
          merge-multiple: false
          digest-mismatch: error
      - name: Promote smoked mod images
        run: |
          set -euo pipefail
          promote_image() {
            local mod="$1" arch="$2" image_dir source_ref stable_ref
            image_dir="mod-images/mod-image-${mod}-${arch}"
            docker load -i "${image_dir}/image.tar"
            source_ref="$(sed -n '1p' "${image_dir}/image-ref.txt")"
            stable_ref="ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-${mod}:${GITHUB_REF_NAME}-${arch}"
            docker tag "$source_ref" "$stable_ref"
            docker push "$stable_ref"
          }
          promote_image plex amd64
          promote_image plex arm64
          promote_image emby amd64
          promote_image emby arm64

          docker manifest create \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}-amd64" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}-arm64"
          docker manifest push "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-plex:${GITHUB_REF_NAME}"

          docker manifest create \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}-amd64" \
            "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}-arm64"
          docker manifest push "ghcr.io/${OWNER_NAME}/linuxserver-mod-sqlite3-emby:${GITHUB_REF_NAME}"
